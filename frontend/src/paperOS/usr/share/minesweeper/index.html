<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <style>
            /* Scoped CSS for PaperOS Card */
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 400px;
                margin-bottom: 10px;
            }
            #grid {
                display: grid;
                grid-template-columns: repeat(10, 35px);
                grid-template-rows: repeat(10, 35px);
                gap: 2px;
                background-color: #333;
                padding: 4px;
                border: 2px solid #555;
                border-radius: 4px;
                box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            }
            .cell {
                background-color: #888;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 1.2em;
                font-weight: bold;
                cursor: pointer;
                user-select: none;
                transition: background-color 0.1s;
            }
            .cell:hover { background-color: #999; }
            .cell.revealed { background-color: #ccc; cursor: default; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.3); }
            .cell.mine { background-color: #ff3333; }
            .cell.flag { color: #ff3333; }
            
            button {
                background: #333;
                color: #00FF00;
                border: 1px solid #00FF00;
                padding: 8px 20px;
                cursor: pointer;
                font-family: monospace;
                transition: 0.2s;
            }
            button:hover { background: #00FF00; color: #000; }
            p { color: #888; font-size: 0.9em; margin: 0; }
        </style>
    </head>
    <body style="display: flex;
                flex-direction: column;
                align-items: center;
                background-color: rgba(20, 20, 20, 0.85);
                backdrop-filter: blur(10px);
                color: #00FF00;
                padding: 20px;
                font-family: monospace;
                user-select: none;">
                
        <div class="header">
            <h2>Minesweeper</h2>
            <h3 id="mineCount">Mines: 15</h3>
        </div>
        
        <div id="grid"></div>
        
        <div class="header" style="margin-top: 20px;">
            <p id="statusMsg">Left Click: Reveal | Right Click: Flag</p>
            <button id="restartBtn">Restart</button>
        </div>
    </body>
</html>
