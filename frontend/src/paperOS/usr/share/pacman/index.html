<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <style>
            #gameContainer {
                display: flex;
                flex-direction: column;
                align-items: center;
                background-color: rgba(10, 10, 10, 0.9);
                backdrop-filter: blur(10px);
                color: #FFFF00;
                padding: 10px 20px;
                border-radius: 8px;
                font-family: monospace;
                outline: none;
                user-select: none;
            }
            canvas {
                background-color: #000;
                border: 4px solid #1919A6;
                border-radius: 4px;
                box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.7);
                margin: 10px 0;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 420px;
                text-transform: uppercase;
                font-weight: bold;
                font-size: 1.2em;
            }
            button {
                background: #222;
                color: #FFFF00;
                border: 2px solid #FFFF00;
                padding: 6px 16px;
                cursor: pointer;
                font-family: monospace;
                font-weight: bold;
                transition: 0.2s;
            }
            button:hover { background: #FFFF00; color: #000; }
            .info { color: #888; font-size: 0.8em; margin: 0; }
        </style>
    </head>
    <body>
        <div id="gameContainer" tabindex="0">
            <div class="header">
                <span id="scoreDisplay">Score: 0</span>
                <span>Paper-Man</span>
            </div>
            <canvas id="gameCanvas" width="420" height="420"></canvas>
            <div class="header">
                <p class="info">WASD / Arrows to munch.</p>
                <button id="startBtn">Insert Coin</button>
            </div>
        </div>
    </body>
</html>
