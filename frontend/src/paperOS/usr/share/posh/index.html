<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSH | Terminal</title>
    <link rel="stylesheet" href="/usr/share/posh/style.css"/>
</head>
<body style="background-color:rgba(0, 0, 0, 0.712); color:white; backdrop-filter: blur(10px);">
    <div id="Terminal" style="width:100%; height:100%; font-family:'inconsolata NF'; white-space: pre-wrap;">
    </div>
    <div id="Cursor"></div>
    <textarea id="TxtArea" style="position:absolute; width:1px; height:1px; top:0; left:0; resize:none; border-style:0; margin:0; padding:0;"></textarea>
</body>
</html>
