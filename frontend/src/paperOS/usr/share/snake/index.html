<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <style>
            /* Scoped CSS - only affects this PaperOS Card */
            canvas {
                border: 2px solid #555;
                background-color: #111;
                box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
                margin: 15px 0;
            }
            button {
                background: #333;
                color: #00FF00;
                border: 1px solid #00FF00;
                padding: 8px 20px;
                cursor: pointer;
                font-family: monospace;
                transition: 0.2s;
            }
            button:hover {
                background: #00FF00;
                color: #000;
            }
            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                width: 400px;
            }
            p { color: #888; font-size: 0.9em; }
        </style>
    </head>
    <body style="display: flex;
                flex-direction: column;
                align-items: center;
                background-color: rgba(20, 20, 20, 0.85);
                backdrop-filter: blur(10px);
                color: #00FF00;
                padding: 20px;
                font-family: monospace;
">
        <div id="gameContainer" tabindex="0">
            <div class="header">
                <h2>Paper Snake</h2>
                <h3 id="scoreDisplay">Score: 0</h3>
            </div>
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="header">
                <p>WASD or Arrows to move.</p>
                <button id="startBtn">Start Game</button>
            </div>
        </div>
    </body>
</html>
